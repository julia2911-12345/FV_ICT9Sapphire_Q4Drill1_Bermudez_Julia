<h1>Check Kilowatt</h1>

<div class="card-container">
	<input type="text" id="watts" class="form-control mb-3" placeholder="Enter kilowatt per hour...">
	<button class="btn btn-light px-4 py-2" onclick="checkWatts()">Check</button>
	<div id="result"></div>
</div>

<script>
	function checkWatts(){

		var Watts = Number(document.getElementById("watts").value);

		if(isNaN(Watts) || Watts < 0){
			alert("Please input a valid number of Kilowatt.");
		}

		else if (Watts <= 100){
			alert("Lifeline Consumer: Discounted electricity rates");
		}

		else if (Watts >= 101 && Watts <= 200){
			alert("Low Consumption: Normal residential rate.");
		}

		else if (Watts >= 201 && Watts <= 300){
			alert("Average Consumption: Typical electricity usage.");
		}

		else if (Watts >= 301 && Watts <= 500){
			alert("High Consumption: Higher residential rate.");
		}

		else{
			alert("Heavy electricity users");
		}
	}
</script>
